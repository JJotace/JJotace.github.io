<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart DB — Pokémon Card Shop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08090c;
      --surface:   #111319;
      --surface-2: #161924;
      --border:    #232733;
      --accent:    #2fd4b6;
      --accent-dim:#1f9c87;
      --text:      #eef0f4;
      --muted:     #7d8294;
      --muted-2:   #565b6b;

      --ir:  #4a9eff;
      --ur:  #b06bf2;
      --sir: #f5a623;
      --mar: #ef4d4d;
      --mhr: #d9b24a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ---------- top bar ---------- */
    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.22em;
      font-size: 1.05rem;
      color: var(--text);
    }
    .brand b { color: var(--accent); }

    .brand-sub {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-left: 0.1rem;
    }

    /* ---------- layout shell ---------- */
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ---------- search panel ---------- */
    .finder {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.75rem;
    }

    .finder h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .search-row {
      display: flex;
      gap: 0.6rem;
      align-items: stretch;
    }

    .search-field {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0 0.9rem;
      transition: border-color 0.15s;
    }
    .search-field:focus-within { border-color: var(--accent-dim); }

    .search-field svg { flex-shrink: 0; color: var(--muted); }

    .search-field input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.98rem;
      padding: 0.7rem 0;
    }
    .search-field input::placeholder { color: var(--muted-2); }

    .btn-search {
      background: var(--accent);
      color: #04221c;
      border: none;
      font-weight: 700;
      font-size: 0.92rem;
      padding: 0 1.5rem;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-search:hover { background: #3ee4c5; }

    .btn-clear {
      background: transparent;
      color: var(--muted);
      border: none;
      font-size: 0.92rem;
      padding: 0 0.75rem;
      cursor: pointer;
      transition: color 0.15s;
    }
    .btn-clear:hover { color: var(--text); }

    /* ---------- controls row (mode + count) ---------- */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .count { font-size: 0.82rem; color: var(--muted); }

    .mode {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .segmented {
      display: inline-flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .seg {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .seg.active { background: var(--accent); color: #04221c; }

    .mode-hint {
      font-size: 0.76rem;
      color: var(--muted-2);
      margin-top: -0.6rem;
      margin-bottom: 1.25rem;
    }

    /* ---------- card grid ---------- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(196px, 1fr));
      gap: 1.1rem;
    }

    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.7rem;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, transform 0.15s;
    }
    .tile:hover { border-color: var(--accent-dim); transform: translateY(-2px); }

    .thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 5 / 7;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 0.75rem;
      background: var(--surface-2);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: zoom-in;
      position: relative;
      z-index: 2;
    }

    /* placeholder sits behind the img; revealed if img is missing/broken */
    .thumb .ph {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0.75rem;
      background:
        radial-gradient(120% 80% at 50% 0%, #1c2030 0%, #10131c 70%);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .ph-mark {
      font-size: 1.4rem;
      color: var(--muted-2);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .ph-name {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.3;
    }

    .tile-name {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile-set {
      font-size: 0.82rem;
      color: var(--accent);
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .tile-rarity { font-weight: 600; }
    .r-ir  { color: var(--ir); }
    .r-ur  { color: var(--ur); }
    .r-sir { color: var(--sir); }
    .r-mar { color: var(--mar); }
    .r-mhr { color: var(--mhr); }

    .tile-foot {
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.4rem;
    }

    .price { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .price small { font-size: 0.72rem; font-weight: 500; color: var(--muted-2); }
    .price.out { color: var(--muted-2); font-weight: 500; font-size: 0.82rem; }

    .stock { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }

    .dist {
      font-size: 0.68rem;
      color: var(--muted-2);
      font-family: 'Courier New', monospace;
      margin-top: 0.4rem;
    }

    /* ---------- states ---------- */
    .empty, .error, .hint {
      text-align: center;
      padding: 3rem 1rem;
      font-size: 0.92rem;
    }
    .empty { color: var(--muted); }
    .error { color: var(--mar); }
    .hint  { color: var(--muted-2); }

    /* ---------- lightbox ---------- */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 360px;
      max-height: 82vh;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .tile { transition: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="brand">SMART<b>DB</b></span>
  <span class="brand-sub">Pokémon Card Shop</span>
</div>

<div class="shell">

  <div class="finder">
    <h2>Find a card</h2>
    <div class="search-row">
      <div class="search-field">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input id="q" type="text" placeholder="Search by name, set, or rarity…" autocomplete="off" />
      </div>
      <button class="btn-search" onclick="search()">Search</button>
      <button class="btn-clear" onclick="clearSearch()">Clear</button>
    </div>
  </div>

  <div class="controls">
    <span class="count" id="count"></span>
    <div class="mode">
      <span>Search mode</span>
      <div class="segmented">
        <button class="seg active" id="seg-vector" onclick="switchMode('vector')">Semantic</button>
        <button class="seg" id="seg-like" onclick="switchMode('like')">Exact (LIKE)</button>
      </div>
    </div>
  </div>

  <div class="mode-hint" id="mode-hint">Finds cards by meaning — tolerates typos and partial matches.</div>

  <div class="grid" id="results">
    <div class="hint" style="grid-column: 1 / -1;">Search the catalog to see cards.</div>
  </div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  let mode = 'vector';

  document.getElementById('q').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  function switchMode(m) {
    mode = m;
    document.getElementById('seg-vector').classList.toggle('active', m === 'vector');
    document.getElementById('seg-like').classList.toggle('active', m === 'like');
    document.getElementById('mode-hint').textContent = m === 'vector'
      ? 'Finds cards by meaning — tolerates typos and partial matches.'
      : 'Finds cards by exact substring in name, rarity, or set.';
    const q = document.getElementById('q').value.trim();
    if (q) search();
  }

  function clearSearch() {
    document.getElementById('q').value = '';
    document.getElementById('count').textContent = '';
    document.getElementById('results').innerHTML =
      '<div class="hint" style="grid-column: 1 / -1;">Search the catalog to see cards.</div>';
    document.getElementById('q').focus();
  }

  function rarityClass(rarity) {
    const r = rarity.toLowerCase();
    if (r.includes('mega hyper'))           return 'r-mhr';
    if (r.includes('mega attack'))          return 'r-mar';
    if (r.includes('special illustration')) return 'r-sir';
    if (r.includes('ultra'))                return 'r-ur';
    if (r.includes('illustration'))         return 'r-ir';
    return '';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function tile(r, showDistance) {
    const name = escapeHtml(r.name);
    const img = r.image_url
      ? `<img src="${escapeHtml(r.image_url)}" alt="${name}" loading="lazy"
             onclick="openLightbox('${escapeHtml(r.image_url)}','${name}')"
             onerror="this.style.display='none'">`
      : '';

    const price = r.min_price != null
      ? `<span class="price"><small>from</small> $${r.min_price.toFixed(2)}</span>
         <span class="stock">${r.stock} in stock</span>`
      : `<span class="price out">Out of stock</span>`;

    return `
      <div class="tile">
        <div class="thumb">
          <div class="ph"><div class="ph-mark">◈</div><div class="ph-name">${name}</div></div>
          ${img}
        </div>
        <div class="tile-name">${name}</div>
        <div class="tile-set">${escapeHtml(r.set)}</div>
        <div class="tile-meta">
          #${escapeHtml(r.number)} ·
          <span class="tile-rarity ${rarityClass(r.rarity)}">${escapeHtml(r.rarity)}</span>
        </div>
        <div class="tile-foot">${price}</div>
        ${showDistance ? `<div class="dist">distance ${r.distance}</div>` : ''}
      </div>`;
  }

  function renderResults(results, showDistance) {
    const container = document.getElementById('results');
    const count = document.getElementById('count');

    if (!results || results.length === 0) {
      count.textContent = '';
      container.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">No cards found.</div>';
      return;
    }

    count.textContent = `${results.length} result${results.length !== 1 ? 's' : ''}`;
    container.innerHTML = results.map(r => tile(r, showDistance)).join('');
  }

  async function search() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;

    const container = document.getElementById('results');
    document.getElementById('count').textContent = '';
    container.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">Searching…</div>';

    try {
      const endpoint = mode === 'vector'
        ? `/search?q=${encodeURIComponent(q)}`
        : `/search/like?q=${encodeURIComponent(q)}`;
      const res = await fetch(endpoint);
      const data = await res.json();

      if (data.error) {
        container.innerHTML = `<div class="error" style="grid-column: 1 / -1;">${escapeHtml(data.error)}</div>`;
        return;
      }
      renderResults(data.results, mode === 'vector');
    } catch (e) {
      container.innerHTML =
        '<div class="error" style="grid-column: 1 / -1;">Could not reach the service.</div>';
    }
  }

  function openLightbox(src, alt) {
    const img = document.getElementById('lightbox-img');
    img.src = src;
    img.alt = alt;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

</body>
</html>
