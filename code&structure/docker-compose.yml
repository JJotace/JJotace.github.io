services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart_db_postgres
    environment:
      POSTGRES_DB: smart_db
      POSTGRES_USER: smart_user
      POSTGRES_PASSWORD: smart_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_user -d smart_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-service:
    build: ./python-service
    container_name: smart_db_service
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: smart_db
      DB_USER: smart_user
      DB_PASS: smart_pass
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./python-service:/app

volumes:
  postgres_data:
